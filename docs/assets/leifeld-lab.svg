<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none"
     xmlns="http://www.w3.org/2000/svg">
  <title>Leifeld Lab logo</title>
  <desc>Minimal abstract network logo representing statistical inference and structure.</desc>

  <rect x="0" y="0" width="512" height="512" rx="88" fill="#FFFFFF"/>

  <!-- Coordinates are near-grid: x in {112,160,256,336,400}, y in {128,192,240,320,400} -->
  <g stroke="#111111" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 240 L160 128"/>
    <path d="M256 240 L400 192"/>
    <path d="M256 240 L112 320"/>
    <path d="M256 240 L400 320"/>
    <path d="M256 240 L224 400"/>
    <path d="M256 240 L336 400"/>

    <path d="M160 128 L112 320"/>
    <path d="M400 192 L400 320"/>
    <path d="M112 320 L224 400"/>
    <path d="M400 320 L336 400"/>

    <path d="M160 128 L400 192"/>
    <path d="M112 320 L336 400"/>
  </g>

  <g fill="#FFFFFF" stroke="#111111" stroke-width="16">
    <circle cx="256" cy="240" r="21"/>

    <circle cx="160" cy="128" r="18"/>
    <circle cx="400" cy="192" r="16"/>

    <circle cx="112" cy="320" r="17"/>
    <circle cx="400" cy="320" r="19"/>

    <circle cx="224" cy="400" r="16"/>
    <circle cx="336" cy="400" r="18"/>
  </g>
</svg>